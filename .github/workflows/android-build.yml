name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arm64:
    name: Build arm64-v8a APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Halcyon
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platforms;android-37" \
            "build-tools;37.0.0" \
            "platform-tools" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' }}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: ./gradlew --no-daemon :app:assembleDebug -PellaAbi=arm64-v8a --stacktrace

      - name: Build release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'release' }}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: ./gradlew --no-daemon :app:assembleRelease -PellaAbi=arm64-v8a --stacktrace

      - name: List APK outputs
        run: find app/build/outputs/apk -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Halcyon-arm64-v8a-${{ github.sha }}
          path: |
            app/build/outputs/apk/debug/*arm64-v8a*.apk
            app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
